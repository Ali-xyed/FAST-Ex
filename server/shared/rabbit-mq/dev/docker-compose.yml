services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fast-ex-rabbitmq
    ports:
      - "5673:5672"     # app connection port
      - "15673:15672"   # management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123
      RABBITMQ_DEFAULT_VHOST: fast-ex
    volumes:
      - fast-ex-rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  fast-ex-rabbitmq-data: