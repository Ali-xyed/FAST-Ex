services:
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - fast-ex-network

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - fast-ex-network

volumes:
  redis_data:

networks:
  fast-ex-network:
    external: true