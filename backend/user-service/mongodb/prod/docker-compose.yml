services:
  mongodb:
    image: mongo:latest
    container_name: user-mongodb-prod
    ports:
      - "27018:27017" # Note: In production, consider removing ports so it is only available to Docker network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0"]
    restart: always

  mongo-init-replica:
    image: mongo:latest
    container_name: user-mongo-init-replica-prod
    depends_on:
      - mongodb
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongodb:27017 -u admin -p admin123 --authenticationDatabase admin --eval '
          try { rs.status() } catch(e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]}) }
        '
      "
    restart: "no"

volumes:
  mongo_data:
