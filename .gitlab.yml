  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$LISTING_IP "mkdir -p ~/listing-mongodb"
    - scp -o StrictHostKeyChecking=no -r ./backend/listing-service/mongodb/prod/* ubuntu@$LISTING_IP:~/listing-mongodb/
    - ssh -o StrictHostKeyChecking=no ubuntu@$LISTING_IP "cd ~/listing-mongodb && docker compose pull && docker compose up -d"
    - sleep 10
    - ssh -o StrictHostKeyChecking=no ubuntu@$LISTING_IP "docker pull $DOCKER_USERNAME/web-listing:latest && docker rm -f listing || true && docker run -d --name listing --network host -e TZ=Asia/Karachi -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/listing_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=$SHARED_IP:9092 -e REDIS_URL=redis://:$REDIS_PASSWORD@$SHARED_IP:6379 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@$SHARED_IP:5672/$RABBITMQ_VHOST -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY -e AWS_REGION=$AWS_REGION -e S3_BUCKET_NAME=$S3_BUCKET_NAME $DOCKER_USERNAME/web-listing:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$LISTING_IP "docker exec listing npx prisma db push"
  only:
    - main

deploy-messaging:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$MESSAGE_IP "mkdir -p ~/messaging-mongodb"
    - scp -o StrictHostKeyChecking=no -r ./backend/messaging-service/mongodb/prod/* ubuntu@$MESSAGE_IP:~/messaging-mongodb/
    - ssh -o StrictHostKeyChecking=no ubuntu@$MESSAGE_IP "cd ~/messaging-mongodb && docker compose pull && docker compose up -d"
    - sleep 10
    - ssh -o StrictHostKeyChecking=no ubuntu@$MESSAGE_IP "docker pull $DOCKER_USERNAME/web-messages:latest && docker rm -f messaging || true && docker run -d --name messaging --network host -e TZ=Asia/Karachi -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/messaging_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=$SHARED_IP:9092 $DOCKER_USERNAME/web-messages:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$MESSAGE_IP "docker exec messaging npx prisma db push"
  only:
