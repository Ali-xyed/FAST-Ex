deploy-notification:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$NOTIFICATIONS_IP "mkdir -p ~/notification-mongodb"
    - scp -o StrictHostKeyChecking=no -r ./backend/notification-service/mongodb/prod/* ubuntu@$NOTIFICATIONS_IP:~/notification-mongodb/
    - ssh -o StrictHostKeyChecking=no ubuntu@$NOTIFICATIONS_IP "cd ~/notification-mongodb && docker compose pull && docker compose up -d"
    - sleep 10
    - ssh -o StrictHostKeyChecking=no ubuntu@$NOTIFICATIONS_IP "docker pull $DOCKER_USERNAME/web-notifications:latest && docker rm -f notification || true && docker run -d --name notification --network host -e TZ=Asia/Karachi -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/notification_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=$SHARED_IP:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@$SHARED_IP:5672/$RABBITMQ_VHOST -e EMAIL_USER=$EMAIL_USER -e EMAIL_PASS=$EMAIL_PASS $DOCKER_USERNAME/web-notifications:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$NOTIFICATIONS_IP "docker exec notification npx prisma db push"
  only:
    - main

deploy-admin:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$ADMIN_IP "docker image prune -f && docker pull $DOCKER_USERNAME/web-admin:latest && docker rm -f admin || true && docker run -d --name admin -p 5007:5007 -e TZ=Asia/Karachi -e PORT=5007 -e KAFKA_BROKER=$SHARED_IP:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@$SHARED_IP:5672/$RABBITMQ_VHOST -e LISTING_SERVICE_URL=http://$LISTING_IP:5004 -e USER_SERVICE_URL=http://$USER_IP:5003 -e AUTH_SERVICE_URL=http://$AUTH_IP:5002 $DOCKER_USERNAME/web-admin:latest"
  only:
    - main
