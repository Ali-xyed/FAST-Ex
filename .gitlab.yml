stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

default:
  tags:
    - aws

services:
  - name: docker:24.0.5-dind
    alias: docker

.docker-login: &docker-login
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

# --- BUILD JOBS ---
build-gateway:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-api-gateway:latest ./backend/api-gateway
    - docker push $DOCKER_USERNAME/web-api-gateway:latest
  only:
    - main
    - develop

build-auth:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-auth:latest ./backend/auth-service
    - docker push $DOCKER_USERNAME/web-auth:latest
  only:
    - main
    - develop

build-user:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-user:latest ./backend/user-service
    - docker push $DOCKER_USERNAME/web-user:latest
  only:
    - main
    - develop

build-listing:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-listing:latest ./backend/listing-service
    - docker push $DOCKER_USERNAME/web-listing:latest
  only:
    - main
    - develop

build-messaging:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-messages:latest ./backend/messaging-service
    - docker push $DOCKER_USERNAME/web-messages:latest
  only:
    - main
    - develop

build-notification:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-notifications:latest ./backend/notification-service
    - docker push $DOCKER_USERNAME/web-notifications:latest
  only:
    - main
    - develop

build-admin:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-admin:latest ./backend/admin-service
    - docker push $DOCKER_USERNAME/web-admin:latest
  only:
    - main
    - develop

# --- DEPLOY JOBS ---
.ssh-setup: &ssh-setup
  - apk add --no-cache openssh-client
  - mkdir -p ~/.ssh
  - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa

deploy-shared:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$SHARED_IP "mkdir -p ~/shared"
    - scp -o StrictHostKeyChecking=no -r ./backend/shared/* ubuntu@$SHARED_IP:~/shared/
    - ssh -o StrictHostKeyChecking=no ubuntu@$SHARED_IP "docker network create fast-ex-network || true"
    - ssh -o StrictHostKeyChecking=no ubuntu@$SHARED_IP "export KAFKA_EC2_PUBLIC_IP=$SHARED_IP && cd ~/shared/apache-kafka/prod && docker compose up -d"
    - ssh -o StrictHostKeyChecking=no ubuntu@$SHARED_IP "export REDIS_PASSWORD=$REDIS_PASSWORD && cd ~/shared/redis/prod && docker compose up -d"
    - ssh -o StrictHostKeyChecking=no ubuntu@$SHARED_IP "export RABBITMQ_USER=$RABBITMQ_USER RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD RABBITMQ_VHOST=$RABBITMQ_VHOST && cd ~/shared/rabbit-mq/prod && docker compose up -d"
  only:
    - main

deploy-gateway:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$API_GATEWAY_IP "docker image prune -f && docker pull $DOCKER_USERNAME/web-api-gateway:latest && docker rm -f gateway || true && docker run -d --name gateway -p 5000:5000 -e TZ=Asia/Karachi -e PORT=5000 -e REDIS_URL=redis://:$REDIS_PASSWORD@$SHARED_IP:6379 -e AUTH_SERVICE_URL=http://$AUTH_IP:5002 -e USER_SERVICE_URL=http://$USER_IP:5003 -e LISTING_SERVICE_URL=http://$LISTING_IP:5004 -e MESSAGE_SERVICE_URL=http://$MESSAGE_IP:5005 -e NOTIFICATION_SERVICE_URL=http://$NOTIFICATIONS_IP:5006 -e ADMIN_SERVICE_URL=http://$ADMIN_IP:5007 -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e CLIENT_URL='$CLIENT_PROD_URL' $DOCKER_USERNAME/web-api-gateway:latest"
  only:
    - main

deploy-auth:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$AUTH_IP "mkdir -p ~/auth-mongodb"
    - scp -o StrictHostKeyChecking=no -r ./backend/auth-service/mongodb/prod/* ubuntu@$AUTH_IP:~/auth-mongodb/
    - ssh -o StrictHostKeyChecking=no ubuntu@$AUTH_IP "cd ~/auth-mongodb && docker compose pull && docker compose up -d"
    - sleep 10
    - ssh -o StrictHostKeyChecking=no ubuntu@$AUTH_IP "docker pull $DOCKER_USERNAME/web-auth:latest && docker rm -f auth || true && docker run -d --name auth --network host -e TZ=Asia/Karachi -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/auth_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=$SHARED_IP:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@$SHARED_IP:5672/$RABBITMQ_VHOST $DOCKER_USERNAME/web-auth:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$AUTH_IP "docker exec auth npx prisma db push"
  only:
    - main

deploy-user:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - ssh -o StrictHostKeyChecking=no ubuntu@$USER_IP "mkdir -p ~/user-mongodb"
    - scp -o StrictHostKeyChecking=no -r ./backend/user-service/mongodb/prod/* ubuntu@$USER_IP:~/user-mongodb/
    - ssh -o StrictHostKeyChecking=no ubuntu@$USER_IP "cd ~/user-mongodb && docker compose pull && docker compose up -d"
    - sleep 10
    - ssh -o StrictHostKeyChecking=no ubuntu@$USER_IP "docker pull $DOCKER_USERNAME/web-user:latest && docker rm -f user || true && docker run -d --name user --network host -e TZ=Asia/Karachi -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/user_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=$SHARED_IP:9092 -e REDIS_URL=redis://:$REDIS_PASSWORD@$SHARED_IP:6379 -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY -e AWS_REGION=$AWS_REGION -e S3_BUCKET_NAME=$S3_BUCKET_NAME $DOCKER_USERNAME/web-user:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$USER_IP "docker exec user npx prisma db push"
  only:
    - main

