stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

default:
  tags:
    - aws

services:
  - name: docker:27-dind
    alias: docker

.docker-login: &docker-login
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

# --- BUILD JOBS ---
build-client:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-client:latest ./client
    - docker push $DOCKER_USERNAME/web-client:latest
  only:
    - main
    - develop

build-gateway:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-api-gateway:latest ./server/api-gateway
    - docker push $DOCKER_USERNAME/web-api-gateway:latest
  only:
    - main
    - develop

build-auth:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-auth:latest ./server/auth-service
    - docker push $DOCKER_USERNAME/web-auth:latest
  only:
    - main
    - develop

build-user:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-user:latest ./server/user-service
    - docker push $DOCKER_USERNAME/web-user:latest
  only:
    - main
    - develop

build-listing:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-listing:latest ./server/listing-service
    - docker push $DOCKER_USERNAME/web-listing:latest
  only:
    - main
    - develop

build-messaging:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-messages:latest ./server/messaging-service
    - docker push $DOCKER_USERNAME/web-messages:latest
  only:
    - main
    - develop

build-notification:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-notifications:latest ./server/notification-service
    - docker push $DOCKER_USERNAME/web-notifications:latest
  only:
    - main
    - develop

build-admin:
  <<: *docker-login
  stage: build
  image: docker:27
  script:
    - docker build -t $DOCKER_USERNAME/web-admin:latest ./server/admin-service
    - docker push $DOCKER_USERNAME/web-admin:latest
  only:
    - main
    - develop

build-shared:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/web-shared:latest ./server/shared
    - docker push $DOCKER_USERNAME/web-shared:latest
  only:
    - main
    - develop

# --- DEPLOY JOBS ---
.ssh-setup: &ssh-setup
  - apk add --no-cache openssh-client
  - mkdir -p ~/.ssh
  - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

deploy-infrastructure:
  stage: deploy
  image: alpine:latest
  script:
    - *ssh-setup
    - echo "Deploying shared infrastructure (Kafka, Redis, RabbitMQ) to $EC2_IP"
    - ssh ubuntu@$EC2_IP "mkdir -p ~/fast-ex/shared"
    - scp -r ./server/shared/* ubuntu@$EC2_IP:~/fast-ex/shared/
    - ssh ubuntu@$EC2_IP "docker network create fast-ex-network || true"
    - ssh ubuntu@$EC2_IP "export KAFKA_EC2_PUBLIC_IP=$EC2_IP && cd ~/fast-ex/shared/apache-kafka/prod && docker compose up -d"
    - ssh ubuntu@$EC2_IP "export REDIS_PASSWORD=$REDIS_PASSWORD && cd ~/fast-ex/shared/redis/prod && docker compose up -d"
    - ssh ubuntu@$EC2_IP "export RABBITMQ_USER=$RABBITMQ_USER RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD RABBITMQ_VHOST=$RABBITMQ_VHOST && cd ~/fast-ex/shared/rabbit-mq/prod && docker compose up -d"
    - echo "Infrastructure deployed successfully"
  only:
    - main

deploy-databases:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-infrastructure"]
  script:
    - *ssh-setup
    - echo "Deploying MongoDB instances to $EC2_IP"
    - ssh ubuntu@$EC2_IP "mkdir -p ~/fast-ex/databases/{auth,user,listing,messaging,notification}"
    - scp -r ./server/auth-service/mongodb/prod/* ubuntu@$EC2_IP:~/fast-ex/databases/auth/
    - scp -r ./server/user-service/mongodb/prod/* ubuntu@$EC2_IP:~/fast-ex/databases/user/
    - scp -r ./server/listing-service/mongodb/prod/* ubuntu@$EC2_IP:~/fast-ex/databases/listing/
    - scp -r ./server/messaging-service/mongodb/prod/* ubuntu@$EC2_IP:~/fast-ex/databases/messaging/
    - scp -r ./server/notification-service/mongodb/prod/* ubuntu@$EC2_IP:~/fast-ex/databases/notification/
    - ssh ubuntu@$EC2_IP "cd ~/fast-ex/databases/auth && docker compose up -d"
    - ssh ubuntu@$EC2_IP "cd ~/fast-ex/databases/user && docker compose up -d"
    - ssh ubuntu@$EC2_IP "cd ~/fast-ex/databases/listing && docker compose up -d"
    - ssh ubuntu@$EC2_IP "cd ~/fast-ex/databases/messaging && docker compose up -d"
    - ssh ubuntu@$EC2_IP "cd ~/fast-ex/databases/notification && docker compose up -d"
    - sleep 15
    - echo "All MongoDB instances deployed"
  only:
    - main

deploy-backend-services:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-databases", "build-gateway", "build-auth", "build-user", "build-listing", "build-messaging", "build-notification", "build-admin"]
  script:
    - *ssh-setup
    - echo "Deploying all backend microservices to $EC2_IP"
    
    # Deploy Auth Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-auth:latest && docker rm -f auth || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name auth --network host --restart unless-stopped -e TZ=Asia/Karachi -e AUTH_PORT=5002 -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY -e DATABASE_URL='mongodb://admin:admin123@localhost:27017/auth_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=localhost:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@localhost:5672/$RABBITMQ_VHOST $DOCKER_USERNAME/web-auth:latest"
    - sleep 5
    - ssh ubuntu@$EC2_IP "docker exec auth npx prisma db push || true"
    
    # Deploy User Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-user:latest && docker rm -f user || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name user --network host --restart unless-stopped -e TZ=Asia/Karachi -e USER_PORT=5003 -e DATABASE_URL='mongodb://admin:admin123@localhost:27018/user_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=localhost:9092 -e REDIS_URL=redis://:$REDIS_PASSWORD@localhost:6379 -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY -e AWS_REGION=$AWS_REGION -e S3_BUCKET_NAME=$S3_BUCKET_NAME $DOCKER_USERNAME/web-user:latest"
    - sleep 5
    - ssh ubuntu@$EC2_IP "docker exec user npx prisma db push || true"
    
    # Deploy Listing Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-listing:latest && docker rm -f listing || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name listing --network host --restart unless-stopped -e TZ=Asia/Karachi -e LISTING_PORT=5004 -e DATABASE_URL='mongodb://admin:admin123@localhost:27019/listing_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=localhost:9092 -e REDIS_URL=redis://:$REDIS_PASSWORD@localhost:6379 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@localhost:5672/$RABBITMQ_VHOST -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY -e AWS_REGION=$AWS_REGION -e S3_BUCKET_NAME=$S3_BUCKET_NAME $DOCKER_USERNAME/web-listing:latest"
    - sleep 5
    - ssh ubuntu@$EC2_IP "docker exec listing npx prisma db push || true"
    
    # Deploy Messaging Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-messages:latest && docker rm -f messaging || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name messaging --network host --restart unless-stopped -e TZ=Asia/Karachi -e MESSAGE_PORT=5005 -e DATABASE_URL='mongodb://admin:admin123@localhost:27020/messaging_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=localhost:9092 $DOCKER_USERNAME/web-messages:latest"
    - sleep 5
    - ssh ubuntu@$EC2_IP "docker exec messaging npx prisma db push || true"
    
    # Deploy Notification Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-notifications:latest && docker rm -f notification || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name notification --network host --restart unless-stopped -e TZ=Asia/Karachi -e NOTIFICATION_PORT=5006 -e DATABASE_URL='mongodb://admin:admin123@localhost:27021/notification_db?authSource=admin&directConnection=true' -e KAFKA_BROKER=localhost:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@localhost:5672/$RABBITMQ_VHOST -e EMAIL_USER=$EMAIL_USER -e EMAIL_PASS=$EMAIL_PASS $DOCKER_USERNAME/web-notifications:latest"
    - sleep 5
    - ssh ubuntu@$EC2_IP "docker exec notification npx prisma db push || true"
    
    # Deploy Admin Service
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-admin:latest && docker rm -f admin || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name admin --network host --restart unless-stopped -e TZ=Asia/Karachi -e ADMIN_PORT=5007 -e KAFKA_BROKER=localhost:9092 -e RABBITMQ_URL=amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@localhost:5672/$RABBITMQ_VHOST -e LISTING_SERVICE_URL=http://localhost:5004 -e USER_SERVICE_URL=http://localhost:5003 -e AUTH_SERVICE_URL=http://localhost:5002 -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY $DOCKER_USERNAME/web-admin:latest"
    
    # Deploy API Gateway
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-api-gateway:latest && docker rm -f gateway || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name gateway --network host --restart unless-stopped -e TZ=Asia/Karachi -e PORT=5000 -e REDIS_URL=redis://:$REDIS_PASSWORD@localhost:6379 -e AUTH_SERVICE_URL=http://localhost:5002 -e USER_SERVICE_URL=http://localhost:5003 -e LISTING_SERVICE_URL=http://localhost:5004 -e MESSAGE_SERVICE_URL=http://localhost:5005 -e NOTIFICATION_SERVICE_URL=http://localhost:5006 -e ADMIN_SERVICE_URL=http://localhost:5007 -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e CLIENT_URL=$DOMAIN_URL $DOCKER_USERNAME/web-api-gateway:latest"
    
    - echo "All backend services deployed successfully"
  only:
    - main

deploy-frontend:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-backend-services", "build-client"]
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
  script:
    - echo "Deploying frontend client to $EC2_IP"
    - ssh ubuntu@$EC2_IP "sudo apt update && sudo apt install -y nginx"
    - ssh ubuntu@$EC2_IP "docker pull $DOCKER_USERNAME/web-client:latest && docker rm -f client || true"
    - ssh ubuntu@$EC2_IP "docker run -d --name client -p 3000:80 --restart unless-stopped -e VITE_API_BASE_URL=$DOMAIN_URL -e VITE_SOCKET_URL=$DOMAIN_URL $DOCKER_USERNAME/web-client:latest"
    - ssh ubuntu@$EC2_IP 'echo "server { listen 80; server_name fast-ex.duckdns.org; location / { proxy_pass http://localhost:3000; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection \"upgrade\"; proxy_set_header Host \$host; proxy_cache_bypass \$http_upgrade; proxy_set_header X-Real-IP \$remote_addr; proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto \$scheme; } location /api/ { proxy_pass http://localhost:5000/api/; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection \"upgrade\"; proxy_set_header Host \$host; proxy_cache_bypass \$http_upgrade; proxy_set_header X-Real-IP \$remote_addr; proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto \$scheme; } location /socket.io/ { proxy_pass http://localhost:5000/socket.io/; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection \"upgrade\"; proxy_set_header Host \$host; proxy_cache_bypass \$http_upgrade; proxy_set_header X-Real-IP \$remote_addr; proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for; } }" | sudo tee /etc/nginx/sites-available/fast-ex'
    - ssh ubuntu@$EC2_IP "sudo ln -sf /etc/nginx/sites-available/fast-ex /etc/nginx/sites-enabled/fast-ex"
    - ssh ubuntu@$EC2_IP "sudo rm -f /etc/nginx/sites-enabled/default"
    - ssh ubuntu@$EC2_IP "sudo nginx -t && sudo systemctl restart nginx"
    - echo "Frontend deployed successfully at http://fast-ex.duckdns.org"
    - echo "Note - DuckDNS provides HTTPS automatically, access via https://fast-ex.duckdns.org"
  only:
    - main

verify-deployment:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-frontend"]
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
  script:
    - echo "Verifying deployment on $EC2_IP"
    - ssh ubuntu@$EC2_IP "docker ps"
    - echo "Checking service health..."
    - sleep 10
    - curl -f http://$EC2_IP || echo "Frontend not responding yet"
    - curl -f http://$EC2_IP:5000 || echo "API Gateway not responding yet"
    - curl -f http://$EC2_IP:5002 || echo "Auth Service not responding yet"
    - curl -f http://$EC2_IP:5003 || echo "User Service not responding yet"
    - curl -f http://$EC2_IP:5004 || echo "Listing Service not responding yet"
    - curl -f http://$EC2_IP:5005 || echo "Message Service not responding yet"
    - curl -f http://$EC2_IP:5006 || echo "Notification Service not responding yet"
    - curl -f http://$EC2_IP:5007 || echo "Admin Service not responding yet"
    - echo "========================================="
    - echo "Deployment Complete!"
    - echo "Frontend URL - $DOMAIN_URL"
    - echo "API Gateway - http://$EC2_IP:5000"
    - echo "========================================="
  only:
    - main
